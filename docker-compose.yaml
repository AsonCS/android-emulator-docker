
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: android-emulator-docker-app
    volumes:
      - ./.devcontainer:/home/ubuntu/.devcontainer
      - ./.env:/home/ubuntu/.env
      - ./app:/home/ubuntu/app
      - ./docker-compose.yaml:/home/ubuntu/docker-compose.yaml
      - ./Dockerfile.app:/home/ubuntu/Dockerfile.app
    env_file:
      - ./.env
    ports:
      - "8001:80"
    extra_hosts:
      - host.docker.internal:host-gateway
    # command: sleep infinity
  
  emulator:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    container_name: android-emulator-docker-emulator
    devices:
      - /dev/kvm:/dev/kvm:rwm
    env_file:
      - ./.env
    ports:
      - "8000:80"
      - "5595:5595"
    extra_hosts:
      - host.docker.internal:host-gateway
    # command: sleep infinity
