
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: android-emulator-docker-app
    volumes:
      - .:/home/ubuntu
    env_file:
      - ./.env
    ports:
      - "8001:80"
    extra_hosts:
      - host.docker.internal:host-gateway
    command: sleep infinity
  
  emulator:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    container_name: android-emulator-docker-emulator
    devices:
      - /dev/kvm:/dev/kvm:rwm
    env_file:
      - ./.env
    ports:
      - "8000:80"
      - "5595:5595"
    extra_hosts:
      - host.docker.internal:host-gateway
    # command: sleep infinity
