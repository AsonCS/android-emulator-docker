
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: android-emulator-docker-app
    volumes:
      - ./app:/home/ubuntu/app
    environment:
      - ADB_KEY=$ADB_KEY # export ADB_KEY=$(cat ~/.android/adbkey)
    ports:
      - "8001:80"
    extra_hosts:
      - host.docker.internal:172.17.0.1
    command: sleep infinity
  
  emulator:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    container_name: android-emulator-docker-emulator
    devices:
      - /dev/kvm
    environment:
      - ADB_KEY=$ADB_KEY # export ADB_KEY=$(cat ~/.android/adbkey)
    ports:
      - "8000:80"
      - "5554:5554"
      - "5555:5555"
    extra_hosts:
      - host.docker.internal:172.17.0.1
    # command: sleep infinity
