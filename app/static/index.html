<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Emulator Screencast</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #51cf66;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @keyframes pulse-green {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .content {
            padding: 30px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-weight: 600;
            color: #333;
            min-width: 100px;
        }

        .control-group input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .control-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #667eea;
            color: white;
        }

        .button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .button:active {
            transform: translateY(0);
        }

        .screen-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 9 / 16;
            max-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .screen-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .screen-container img.active {
            display: block;
        }

        .loading {
            color: #999;
            font-size: 16px;
            text-align: center;
        }

        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                justify-content: space-between;
            }

            .button {
                width: 100%;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Android Emulator Screencast</h1>
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>
        </div>

        <div class="content">
            <div class="error" id="errorBox"></div>

            <div class="controls">
                <div class="control-group">
                    <label for="intervalInput">Screenshot Interval (s):</label>
                    <input type="number" id="intervalInput" value="1" min="0.1" max="10" step="0.1">
                </div>
                <button class="button" onclick="updateInterval()">Update Interval</button>
                <button class="button" onclick="getStatus()" style="background: #764ba2;">Get Status</button>
            </div>

            <div class="screen-container">
                <img id="screenshot" class="active" alt="Emulator screenshot">
                <div class="loading" id="loading">Connecting to emulator...</div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="frameCount">0</div>
                    <div class="stat-label">Frames Received</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="currentInterval">1.0</div>
                    <div class="stat-label">Interval (s)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="clientCount">0</div>
                    <div class="stat-label">Connected Clients</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let frameCount = 0;
        let isConnected = false;

        // Connection handlers
        socket.on("connect", () => {
            isConnected = true;
            updateStatusIndicator();
            showError("");
            console.log("Connected to screencast server");
        });

        socket.on("disconnect", () => {
            isConnected = false;
            updateStatusIndicator();
            showError("Connection lost. Reconnecting...");
        });

        // Screenshot handler
        socket.on("screenshot", (data) => {
            const img = document.getElementById("screenshot");
            img.src = `data:image/png;base64,${data.image}`;
            frameCount++;
            document.getElementById("frameCount").textContent = frameCount;
        });

        // Interval update confirmation
        socket.on("interval_updated", (data) => {
            document.getElementById("currentInterval").textContent = data.interval.toFixed(1);
            showError("");
        });

        // Status update
        socket.on("status", (data) => {
            document.getElementById("clientCount").textContent = data.connected_clients;
            document.getElementById("currentInterval").textContent = data.screenshot_interval.toFixed(1);
            showError(`Active: ${data.broadcast_active ? "Yes" : "No"}`);
        });

        // Error handler
        socket.on("error", (data) => {
            showError(`Error: ${data.message}`);
            console.error("Socket error:", data);
        });

        // UI Functions
        function updateStatusIndicator() {
            const dot = document.getElementById("statusDot");
            const text = document.getElementById("statusText");
            if (isConnected) {
                dot.classList.add("connected");
                text.textContent = "Connected";
            } else {
                dot.classList.remove("connected");
                text.textContent = "Disconnected";
            }
        }

        function updateInterval() {
            const interval = parseFloat(document.getElementById("intervalInput").value);
            if (isNaN(interval) || interval < 0.1 || interval > 10) {
                showError("Interval must be between 0.1 and 10 seconds");
                return;
            }
            socket.emit("set_interval", { interval });
        }

        function getStatus() {
            socket.emit("get_status");
        }

        function showError(message) {
            const errorBox = document.getElementById("errorBox");
            if (message) {
                errorBox.textContent = message;
                errorBox.classList.add("show");
            } else {
                errorBox.classList.remove("show");
            }
        }

        // Initialize
        updateStatusIndicator();
    </script>
</body>
</html>
